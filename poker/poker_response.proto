syntax = "proto3";

package poker_response;

// 방 목록 응답
message S_GetRoomList {
    repeated RoomInfo rooms = 1;
}

// 방 생성 응답
message S_CreateRoom {
    bool success = 1;
    string message = 2;
    RoomInfo room = 3;
}

// 방 입장 응답 (입장한 본인 + 기존 플레이어에게 브로드캐스트)
message S_JoinRoom {
    bool success = 1;
    string message = 2;
    RoomInfo room = 3;
}

// 방 퇴장 응답 (브로드캐스트)
message S_LeaveRoom {
    string userId = 1;
}

// 게임 시작 응답 (개인별 전송 - 본인 카드 + 게임 정보)
message S_StartGame {
    int32 mySeatNumber = 1;
    int32 sbSeatNumber = 2;
    int32 bbSeatNumber = 3;
    repeated Card handCards = 4;        // 홀 카드 2장
    repeated PlayerInfo players = 5;    // 이번 게임 참여 플레이어 목록
}


// 베팅 차례 알림
// userId가 본인이면 canXxx 플래그로 버튼 활성화
// 레이즈 슬라이더 범위: minBet ~ maxBet
message S_BetTurn {
    string userId    = 1;
    int32  timeLimit = 2;  // 제한 시간(초)

    // 액션 가능 여부 (서버 계산, 클라이언트는 이 값만 보고 UI 설정)
    bool canFold  = 3;
    bool canCheck = 4;  // callAmount == 0
    bool canCall  = 5;  // balance >= callAmount
    bool canRaise = 6;  // balance > callAmount (콜 후 잔액 > 0)
    bool canAllIn = 7;  // 항상 true (balance > 0)

    // 콜 정보
    int64 callAmount = 8;  // 콜하려면 얼마 필요한지 (0이면 콜 불필요)

    // 레이즈 슬라이더 범위
    int64 minBet = 9;   // 최소 레이즈 가능 총액 (currentBet + minRaise)
    int64 maxBet = 10;  // 최대 베팅 가능 총액 (보유 잔액 전체 = 올인)

    // 현재 팟 정보 (UI 표시용)
    int64 pot     = 11;
    int64 balance = 12; // 본인 현재 잔액

    // 현재 스트리트 — OPEN_COMMUNITY_CARDS 없이도 UI 동기화 (패킷 순서/유실 대비)
    GamePhase gamePhase = 13;
}

// 베팅 결과 브로드캐스트
message S_BetResult {
    string userId = 1;
    BetActionType action = 2;
    int32 amount = 3;
    int32 pot = 4;            // 현재 총 팟
    int64 playerBalance = 5;  // 베팅 후 해당 플레이어 잔액
}

// 커뮤니티 카드 공개 (브로드캐스트)
message S_OpenCommunityCards {
    GamePhase phase = 1;
    repeated Card cards = 2; // 플랍 3장 / 턴 1장 / 리버 1장
}

// 게임 결과 (개인별 전송)
message S_GameResult {
    repeated PlayerResult results = 1;
    // true: 리버까지 진행 후 패 비교(비폴드 플레이어 홀 카드 공개). false: 폴드 펏 등으로 종료 → 홀 카드 미공개
    bool isShowdown = 2;
    // 쇼다운 시 "이 시트의 카드를 내 앞으로 가져오는 모션" 대상 시트 번호
    // 루저: 승자 시트 / 위너: 나 다음으로 높은 패를 가진 상대 시트 / 없으면 0 (모션 없음)
    int32 revealTargetSeatNumber = 3;
}

// 게임 로그 메시지 (브로드캐스트)
// 베팅 액션, 커뮤니티 카드 공개, 게임 시작/종료 등 주요 이벤트마다 전송
message S_Notice {
    string message      = 1;
    NoticeType noticeType = 2; // 로그 종류 — 클라이언트는 이 값으로 스타일(색상/폰트) 분기
}

enum NoticeType {
    NOTICE_SYSTEM    = 0; // 게임 시작·종료 등 시스템 메시지 (흰색/회색)
    NOTICE_ACTION    = 1; // 폴드·체크·콜·레이즈·올인 등 베팅 액션 (기본색)
    NOTICE_WINNER    = 2; // 승자 확정 메시지 (금색/노란색)
    NOTICE_COMMUNITY = 3; // 플랍·턴·리버 커뮤니티 카드 공개 (하늘색/청록색)
}

// 공통 데이터 타입

message RoomInfo {
    int32 roomId = 1;
    string roomName = 2;
    int32 currentPlayers = 3;
    int32 maxPlayers = 4;
    int32 blindAmount = 5; // 빅 블라인드
    RoomState state = 6;
    repeated PlayerInfo players = 7;
}

message PlayerInfo {
    string userId = 1;
    int32  seatNumber = 2; // 1~5번
    int64  balance = 3;    // 보유 금액
}

message Card {
    CardSuit suit = 1;
    int32 number = 2; // 1(A) ~ 13(K)
}

message PlayerResult {
    string userId = 1;
    repeated Card handCards = 2;
    int32 gainAmount = 3;    // 획득 금액 (잃으면 음수)
    bool isWinner = 4;
    string handRank = 5;     // "풀하우스", "스트레이트" 등
    int64 finalBalance = 6;  // 게임 종료 후 최종 잔액
    int32 seatNumber = 7;    // 해당 플레이어 시트 번호 (1~5)
}

enum BetActionType {
    FOLD = 0;
    CHECK = 1;
    CALL = 2;
    RAISE = 3;
    ALL_IN = 4;
}

enum GamePhase {
    PRE_FLOP = 0;
    FLOP = 1;
    TURN = 2;
    RIVER = 3;
    SHOWDOWN = 4;
}

enum CardSuit {
    SPADE = 0;
    HEART = 1;
    DIAMOND = 2;
    CLUB = 3;
}

enum RoomState {
    WAITING = 0;
    IN_GAME = 1;
}
