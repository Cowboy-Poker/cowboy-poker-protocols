syntax = "proto3";

package lobby_request;

import "common/common.proto";

// UDP 첫 연결 핸드셰이크 (sessionId = 0으로 전송)
message C_UDP_HELLO {}

// 로비 캐릭터 이동
// anim_state: bitmask  0x01=점프중  0x02=조준중
message C_LOBBY_MOVE {
    common.TransformInfo transform = 1;
    uint32 anim_state = 2;
}

// 연결 유지 핑
message C_LOBBY_HEARTBEAT {}
