syntax = "proto3";

package login;

// 로그인 요청
message C_Login {
    string userId = 1;
    string password = 2;
}

// 로그인 응답
message S_Login {
    bool   success  = 1;
    string message  = 2;

    // 유저 세션 전체 정보
    string nickname  = 3;
    int64  balance   = 4;
    string scene     = 5;  // 현재 씬 (Lobby or Poker)
    int32  hp        = 6;
    int32  charType  = 7;  // CharacterType
    float  posX      = 8;
    float  posY      = 9;
    float  posZ      = 10;
    float  rot       = 11;
    int32  weapon    = 12; // WeaponType
    int32  ammoType  = 13; // AmmoType
}

// 회원가입 요청
message C_Register {
    string userId = 1;
    string password = 2;
    string nickname = 3;
}

// 회원가입 응답
message S_Register {
    bool success = 1;
    string message = 2;
}
  